name: SafeBrowse
options:
  bundleIdPrefix: com.safebrowse
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

# ─────────────────────────────────────────────
# App target (menu bar)
# ─────────────────────────────────────────────
targets:
  SafeBrowse:
    type: application
    platform: macOS
    sources:
      - path: SafeBrowse
        excludes:
          - "**/*.md"
      - path: Shared
    info:
      path: SafeBrowse/Info.plist
      properties:
        CFBundleIconFile: SafeBrowse
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.safebrowse.app
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: "NO"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        # Embed the helper binary in Resources so install.sh can find it
        COPY_PHASE_STRIP: "NO"
    dependencies:
      - sdk: Security.framework
      - target: safebrowse-helper
        embed: false
    preBuildScripts:
      - name: "Copy helper to Resources"
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/safebrowse-helper
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/install.sh
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/uninstall.sh
        script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources"
          cp "${BUILT_PRODUCTS_DIR}/safebrowse-helper" \
             "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/safebrowse-helper" 2>/dev/null || true
          cp "${SRCROOT}/install.sh" \
             "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/install.sh"
          cp "${SRCROOT}/uninstall.sh" \
             "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/uninstall.sh"

# ─────────────────────────────────────────────
# Helper target (CLI daemon)
# ─────────────────────────────────────────────
  safebrowse-helper:
    type: tool
    platform: macOS
    sources:
      - path: SafeBrowseHelper
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.safebrowse.helper
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: "NO"
        INSTALL_PATH: /usr/local/bin
